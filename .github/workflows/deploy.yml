name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          source: "deploy/phone/compose.yaml,deploy/phone/.env.example,deploy/phone/update.sh"
          target: ~/mobian-web-monitor
          strip_components: 0

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            cd ~/mobian-web-monitor/deploy/phone
            
            # Pull and restart
            docker compose pull
            docker compose up -d
            
            # Ensure shared Caddy can reach the app network
            docker network connect caddy_net mobian-web-monitor-app 2>/dev/null || true
            
            # Show status
            docker compose ps
