name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            cd ~/mobian-web-monitor
            
            # Update deploy files
            mkdir -p deploy/phone
            
            # Pull and restart
            cd deploy/phone
            docker compose pull
            docker compose up -d
            
            # Ensure shared Caddy can reach the app network
            docker network connect caddy_net mobian-web-monitor-app 2>/dev/null || true
            
            # Show status
            docker compose ps
