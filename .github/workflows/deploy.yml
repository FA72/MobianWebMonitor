name: Deploy Phone

on:
  workflow_run:
    workflows: [Publish Container]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobian-monitor-phone-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - mobian-monitor-phone

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Sync deploy bundle into live directory
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="$HOME/mobian-web-monitor"
          mkdir -p "$PROJECT_DIR"
          tar \
            --exclude='.env' \
            --exclude='volumes' \
            -czf /tmp/mobian-deploy-phone.tgz \
            -C "$GITHUB_WORKSPACE" deploy/phone
          tar -xzf /tmp/mobian-deploy-phone.tgz -C "$PROJECT_DIR"
          rm -f /tmp/mobian-deploy-phone.tgz

      - name: Deploy on phone
        run: |
          set -euo pipefail
          PROJECT_DIR="$HOME/mobian-web-monitor/deploy/phone"
          chmod +x "$PROJECT_DIR/update.sh"
          cd "$PROJECT_DIR"
          if [[ ! -f .env ]]; then
            echo "deploy/phone/.env is missing on the phone. Create it once from .env.example before enabling auto-deploy." >&2
            exit 1
          fi
          ./update.sh
